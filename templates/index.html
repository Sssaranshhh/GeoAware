<!DOCTYPE html>
<html>
<head>
    <title>GeoAware API Tester</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .response-box {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1>GeoAware API Tester</h1>
        
        <!-- Prediction Form -->
        <div class="card mt-4">
            <div class="card-header">
                <h3>Test Hazard Prediction</h3>
            </div>
            <div class="card-body">
                <form id="predictionForm">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label class="form-label">Latitude</label>
                                <input type="number" step="any" class="form-control" name="latitude" value="19.076">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label class="form-label">Longitude</label>
                                <input type="number" step="any" class="form-control" name="longitude" value="72.8777">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label class="form-label">Depth</label>
                                <input type="number" step="any" class="form-control" name="depth" value="10">
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label class="form-label">Magnitude</label>
                                <input type="number" step="any" class="form-control" name="magnitude" value="4.5">
                            </div>
                        </div>
                        
                    </div>
                    <button type="submit" class="btn btn-primary">Predict Hazard</button>
                </form>
                <div id="predictionResponse" class="response-box d-none"></div>
            </div>
        </div>

        <!-- Other API Tests -->
        <div class="card mt-4">
            <div class="card-header">
                <h3>Test Other Endpoints</h3>
            </div>
            <div class="card-body">
                <button onclick="testEndpoint('weather')" class="btn btn-info">Test Weather</button>
                <button onclick="testEndpoint('seismic')" class="btn btn-warning">Test Seismic</button>
                <button onclick="testEndpoint('trends')" class="btn btn-success">Test Trends</button>
                <div id="apiResponse" class="response-box d-none"></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#predictionForm').on('submit', function(e) {
                e.preventDefault();
                $.post('/test/predict', $(this).serialize(), function(response) {
                    $('#predictionResponse')
                        .html('<pre>' + JSON.stringify(response, null, 2) + '</pre>')
                        .removeClass('d-none');
                });
            });
        });

        function testEndpoint(endpoint) {
            $.get('/test/' + endpoint, function(response) {
                $('#apiResponse')
                    .html('<pre>' + JSON.stringify(response, null, 2) + '</pre>')
                    .removeClass('d-none');
            });
        }
    </script>
</body>
</html>
